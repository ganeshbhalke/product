<div class="card">
    <div class="card-body">
        <form [formGroup]="productForm">

  <div class="form-group mb-3">

    <label>Product Name</label>

    <input
      type="text"
      class="form-control"
      formControlName="pname">

  </div>

  <div class="form-group mb-3">

    <label>Price</label>

    <input
      type="number"
      class="form-control"
      formControlName="price"
      >

  </div>

  <div class="form-group mb-3">

    <label>Category</label>

    <input
      type="text"
      class="form-control"
      formControlName="category"
      >

  </div>

  <div class="form-group mb-3">

    <label>Rating</label>

    <input
      type="number"
      class="form-control"
      formControlName="rating"
      >

  </div>

  <div class="form-group mb-3">

  <label>Offer Price</label>

  <input
    type="number"
    class="form-control"
    formControlName="offerPrice">

</div>

<div class="form-group mb-3">

  <label>Discount</label>

  <input
    type="text"
    class="form-control"
    formControlName="discount">

</div>

  <div class="form-group mb-3">

    <label>Image URL</label>

    <input
      type="text"
      class="form-control"
      formControlName="imgUrl"
      >


  </div>

  <button 
    [disabled]="productForm.invalid"

  mat-raised-button color="primary" class="w-100"
    *ngIf="!isInEditMode"
    (click)="onProductAdd()">

    Add Product

  </button>

  <button
  [disabled]="productForm.invalid"
    mat-raised-button color="warn" class="w-100"
    *ngIf="isInEditMode"
    >
<!-- (click)="onUpdate()" -->
    Update Product

  </button>

</form>
    </div>
</div>
