<div class="container mt-4">

  <!-- FORM -->
  <div class="row">

<div class="col-md-6 offset-md-3">
      <app-product-form

      </app-product-form>

    </div>

  </div>


  <!-- PRODUCT LIST -->
  <div class="row mt-4">

    <div class="col-12">

      <app-product-list

      </app-product-list>

    </div>

  </div>

</div>
